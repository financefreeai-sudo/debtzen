name: debtzen
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_messaging: ^15.0.0

  # Payments
  razorpay_flutter: ^1.3.6

  # Charts
  fl_chart: ^0.68.0

  # Local Storage (offline mode)
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Formatting & UI
  intl: ^0.19.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  google_fonts: ^6.2.1

  # State Management
  provider: ^6.1.5+1

  # Connectivity & Networking
  http: ^1.2.1
  connectivity_plus: ^6.0.3

  # Notifications
  flutter_local_notifications: ^17.1.2

  # File export
  share_plus: ^9.0.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true